<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      padding: 32px 16px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 18px; margin-bottom: 24px; color: #aaa; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #333;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    input:focus, textarea:focus { border-color: #555; }
    textarea { resize: vertical; min-height: 70px; }
    .btn {
      width: 100%;
      padding: 16px;
      background: #fff;
      color: #111;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.ok { background: #1a3a1a; color: #6f6; display: block; }
    .status.err { background: #3a1a1a; color: #f66; display: block; }
    .divider { border: none; border-top: 1px solid #222; margin: 24px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin</h1>

    <div class="field">
      <label>GitHub Token</label>
      <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx">
    </div>

    <hr class="divider">

    <div class="field">
      <label>タイトル（OGP・ページ名）</label>
      <input type="text" id="title" placeholder="【速報】衝撃映像が話題に">
    </div>

    <div class="field">
      <label>説明文（OGP）</label>
      <textarea id="desc" placeholder="SNSで急拡散中の映像です"></textarea>
    </div>

    <div class="field">
      <label>メタ用画像URL（SNSカードに表示）</label>
      <input type="url" id="metaImage" placeholder="https://example.com/ogp.jpg">
    </div>

    <div class="field">
      <label>サイト用画像URL（ランディングページに表示）</label>
      <input type="url" id="siteImage" placeholder="https://example.com/thumb.jpg">
    </div>

    <div class="field">
      <label>アカウント名</label>
      <input type="text" id="name" placeholder="速報ニュース">
    </div>

    <div class="field">
      <label>YouTube URL（リンク先）</label>
      <input type="url" id="yturl" placeholder="https://www.youtube.com/watch?v=...">
    </div>

    <button class="btn" id="submitBtn" onclick="generate()">生成・更新する</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const OWNER = 'inofo3';
    const REPO  = 'info2';
    const BRANCH = 'main';

    async function getFileSha(token, path) {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`, {
        headers: { Authorization: `token ${token}` }
      });
      if (!res.ok) return null;
      const data = await res.json();
      return data.sha;
    }

    async function updateFile(token, path, content, message) {
      const sha = await getFileSha(token, path);
      const body = {
        message,
        content: btoa(unescape(encodeURIComponent(content))),
        branch: BRANCH
      };
      if (sha) body.sha = sha;
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: {
          Authorization: `token ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      return res.ok;
    }

    function buildIndex(title, desc, image) {
      return `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="${title}">
  <meta property="og:description" content="${desc}">
  <meta property="og:image" content="${image}">
  <meta property="og:type" content="article">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="${title}">
  <meta name="twitter:description" content="${desc}">
  <meta name="twitter:image" content="${image}">
  <title>${title}</title>
</head>
<body>
  <script>
    window.location.replace('./news.html');
  <\/script>
</body>
</html>`;
    }

    function buildNews(title, image, name, yturl) {
      return `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${title}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #fafafa;
      min-height: 100vh;
      cursor: pointer;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 100px 20px 40px;
    }
    .profile-name {
      font-size: 19px;
      font-weight: 700;
      color: #111;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }
    .video-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: #111;
      aspect-ratio: 16/9;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13);
    }
    .video-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body onclick="window.location.href='${yturl}'">
  <div class="container">
    <div class="profile-name">${name}</div>
    <div class="video-wrap">
      <img src="${image}" alt="">
    </div>
  </div>
</body>
</html>`;
    }

    async function generate() {
      const token     = document.getElementById('token').value.trim();
      const title     = document.getElementById('title').value.trim();
      const desc      = document.getElementById('desc').value.trim();
      const metaImage = document.getElementById('metaImage').value.trim();
      const siteImage = document.getElementById('siteImage').value.trim();
      const name      = document.getElementById('name').value.trim();
      const yturl     = document.getElementById('yturl').value.trim();
      const status    = document.getElementById('status');
      const btn       = document.getElementById('submitBtn');

      if (!token || !title || !metaImage || !siteImage || !name || !yturl) {
        status.className = 'status err';
        status.textContent = 'Token・タイトル・画像・名前・YouTubeURLは必須です';
        return;
      }

      btn.disabled = true;
      status.className = 'status';
      status.textContent = '更新中...';
      status.style.display = 'block';

      try {
        const [r1, r2] = await Promise.all([
          updateFile(token, 'index.html', buildIndex(title, desc, metaImage), 'Update index.html'),
          updateFile(token, 'news.html',  buildNews(title, siteImage, name, yturl), 'Update news.html')
        ]);

        if (r1 && r2) {
          status.className = 'status ok';
          status.textContent = '✓ index.html と news.html を更新しました';
        } else {
          status.className = 'status err';
          status.textContent = '更新に失敗しました。Tokenを確認してください';
        }
      } catch(e) {
        status.className = 'status err';
        status.textContent = 'エラー: ' + e.message;
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
