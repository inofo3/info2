<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      padding: 32px 16px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 18px; margin-bottom: 24px; color: #aaa; }
    h2 { font-size: 15px; color: #aaa; margin-bottom: 16px; }
    #lastUpdated { font-size: 12px; color: #555; margin-bottom: 20px; display: none; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #333;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #555; }
    .btn {
      width: 100%;
      padding: 16px;
      background: #fff;
      color: #111;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.ok  { background: #1a3a1a; color: #6f6; display: block; }
    .status.err { background: #3a1a1a; color: #f66; display: block; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; }
    .divider { border: none; border-top: 1px solid #222; margin: 24px 0; }
    #resultUrl { margin-top: 12px; display: none; }
    #urlOutput { color: #6f6; cursor: text; }
    .preview { margin-top: 8px; display: none; }
    .preview img { width: 100%; height: auto; border-radius: 8px; opacity: 0.8; object-fit: contain; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin</h1>
    <div id="lastUpdated">最終更新: <span></span></div>

    <div class="field">
      <label>GitHub Token</label>
      <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx">
    </div>

    <hr class="divider">
    <h2>新規生成</h2>

    <div class="field">
      <label>ユーザー名</label>
      <input type="text" id="username" placeholder="例: taro">
    </div>

    <div class="field">
      <label>フォルダ名</label>
      <input type="text" id="folder" placeholder="例: 20260430_1200">
    </div>

    <div class="field">
      <label>タイトル（OGP・ページ名）</label>
      <input type="text" id="title" placeholder="【速報】衝撃映像が話題に">
    </div>

    <div class="field">
      <label>メタ用画像（SNSカード） → card.jpg で保存</label>
      <input type="file" id="metaImage" accept="image/*">
      <div id="metaPreview" class="preview"><img></div>
    </div>

    <div class="field">
      <label>サイト用画像（ランディングページ） → thumb.jpg で保存</label>
      <input type="file" id="siteImage" accept="image/*">
      <div id="sitePreview" class="preview"><img></div>
    </div>

    <div class="field">
      <label>アカウント名</label>
      <input type="text" id="name" placeholder="速報ニュース">
    </div>

    <div class="field">
      <label>リンク先URL</label>
      <input type="url" id="yturl" placeholder="https://...">
    </div>

    <button class="btn" id="submitBtn" onclick="generate()">生成・更新する</button>
    <div class="status" id="status"></div>
    <div id="resultUrl">
      <label>生成されたURL</label>
      <input id="urlOutput" readonly onclick="this.select()">
    </div>

    <hr class="divider">
    <h2>リンク先を変更する</h2>

    <div class="field">
      <label>ユーザー名</label>
      <input type="text" id="editUsername" placeholder="例: taro">
    </div>

    <div class="field">
      <label>フォルダ名</label>
      <input type="text" id="editFolder" placeholder="例: 20260430_1200">
    </div>

    <div class="field">
      <label>新しいリンク先URL</label>
      <input type="url" id="editUrl" placeholder="https://...">
    </div>

    <button class="btn" id="editBtn" onclick="updateUrl()">URLを変更する</button>
    <div class="status" id="editStatus"></div>
  </div>

  <script>
    const OWNER  = 'inofo3';
    const REPO   = 'info2';
    const BRANCH = 'main';

    function genFolderName() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
    }

    function bindStorage(inputId, key) {
      const el = document.getElementById(inputId);
      const saved = localStorage.getItem(key);
      if (saved) el.value = saved;
      el.addEventListener('change', () => localStorage.setItem(key, el.value));
    }

    bindStorage('token', 'gh_token');
    bindStorage('username', 'gh_username');
    bindStorage('yturl', 'gh_yturl');
    document.getElementById('folder').value = genFolderName();

    async function showLastUpdated() {
      const el = document.getElementById('lastUpdated');
      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/commits?per_page=1&sha=${BRANCH}`);
        if (!res.ok) return;
        const [commit] = await res.json();
        if (commit) {
          el.querySelector('span').textContent = new Date(commit.commit.committer.date).toLocaleString('ja-JP');
          el.style.display = 'block';
        }
      } catch {}
    }
    showLastUpdated();

    function cropImage(file, w, h) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            const sr = img.width / img.height;
            const dr = w / h;
            let sx, sy, sw, sh;
            if (sr > dr) {
              sh = img.height; sw = sh * dr; sx = (img.width - sw) / 2; sy = 0;
            } else {
              sw = img.width; sh = sw / dr; sx = 0; sy = (img.height - sh) / 2;
            }
            ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.9));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('metaImage').addEventListener('change', function() {
      showPreview(this.files[0], 'metaPreview', 1200, 630);
    });
    document.getElementById('siteImage').addEventListener('change', function() {
      showPreview(this.files[0], 'sitePreview', 1280, 720);
    });

    async function showPreview(file, previewId, w, h) {
      const wrap = document.getElementById(previewId);
      if (!file) { wrap.style.display = 'none'; return; }
      wrap.querySelector('img').src = await cropImage(file, w, h);
      wrap.style.display = 'block';
    }

    async function getFileSha(token, path) {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}&t=${Date.now()}`, {
        headers: { Authorization: `token ${token}`, 'Cache-Control': 'no-cache' }
      });
      if (!res.ok) return null;
      return (await res.json()).sha;
    }

    async function githubPut(token, path, body) {
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;
      const headers = { Authorization: `token ${token}`, 'Content-Type': 'application/json' };
      let res;
      for (let i = 0; i < 3; i++) {
        const sha = await getFileSha(token, path);
        if (sha) body.sha = sha; else delete body.sha;
        const sentSha = sha || '(なし)';
        res = await fetch(url, { method: 'PUT', headers, body: JSON.stringify(body) });
        if (res.status !== 409) break;
        const errBody = await res.json().catch(() => ({}));
        console.warn(`[試行${i+1}] 409 SHA不一致: 送信=${sentSha} / GitHub応答=${errBody.message}`);
      }
      return res;
    }

    async function uploadImage(token, path, file, isOgp) {
      const dataUrl = await cropImage(file, isOgp ? 1200 : 1280, isOgp ? 630 : 720);
      const res = await githubPut(token, path, {
        message: `Upload ${path}`,
        content: dataUrl.split(',')[1],
        branch: BRANCH
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const detail = [
          `[画像アップロード失敗]`,
          `ファイル: ${path}`,
          `ステータス: ${res.status}`,
          `GitHub: ${err.message || JSON.stringify(err)}`
        ].join('\n');
        throw new Error(detail);
      }
    }

    async function updateFile(token, path, content, message) {
      const res = await githubPut(token, path, {
        message,
        content: btoa(unescape(encodeURIComponent(content))),
        branch: BRANCH
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const detail = [
          `[ファイル生成失敗]`,
          `ファイル: ${path}`,
          `ステータス: ${res.status}`,
          `GitHub: ${err.message || JSON.stringify(err)}`,
          res.status === 409 ? `→ 3回リトライしてもSHA不一致。ブラウザのコンソールで詳細を確認してください。` : ''
        ].filter(Boolean).join('\n');
        throw new Error(detail);
      }
    }

    function buildIndex(title, image) {
      return `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="${title}">
  <meta property="og:image" content="${image}">
  <meta property="og:type" content="article">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="${title}">
  <meta name="twitter:image" content="${image}">
  <title>${title}</title>
</head>
<body>
  <script>window.location.replace('./news.html');<\/script>
</body>
</html>`;
    }

    function buildNews(title, image, name, path) {
      return `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${title}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #fafafa;
      min-height: 100vh;
      cursor: pointer;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 100px 20px 40px;
    }
    .profile-name {
      font-size: 19px;
      font-weight: 700;
      color: #111;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }
    .video-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
      aspect-ratio: 16/9;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13);
    }
    .video-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-name">${name}</div>
    <div class="video-wrap"><img src="${image}" alt=""></div>
  </div>
  <script>
    (function() {
      var SB = 'https://qvttkbjxnvsbufaxqpkj.supabase.co';
      var KEY = 'sb_publishable_Ab6lztc5Y2BHT7IRXXrzMg_soFsDudr';
      var PATH = '${path}';
      function rpc(fn) {
        fetch(SB + '/rest/v1/rpc/' + fn, {
          method: 'POST',
          headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_path: PATH }),
          keepalive: true
        }).catch(function(){});
      }
      rpc('increment_pv');
      fetch('./link.txt').then(function(r){ return r.text(); }).then(function(url) {
        document.body.onclick = function() {
          rpc('increment_ct');
          setTimeout(function(){ window.location.href = url.trim(); }, 100);
        };
      });
    })();
  <\/script>
</body>
</html>`;
    }

    async function generate() {
      const token    = document.getElementById('token').value.trim();
      const username = document.getElementById('username').value.trim();
      const folder   = document.getElementById('folder').value.trim();
      const title    = document.getElementById('title').value.trim();
      const metaFile = document.getElementById('metaImage').files[0];
      const siteFile = document.getElementById('siteImage').files[0];
      const name     = document.getElementById('name').value.trim();
      const yturl    = document.getElementById('yturl').value.trim();
      const status   = document.getElementById('status');
      const btn      = document.getElementById('submitBtn');

      if (!token || !username || !folder || !title || !metaFile || !siteFile || !name || !yturl) {
        status.className = 'status err';
        status.textContent = 'Token・ユーザー名・フォルダ名・タイトル・画像・名前・リンク先URLは必須です';
        return;
      }

      const path = `${username}/${folder}`;
      btn.disabled = true;
      status.className = 'status';
      status.textContent = '画像をアップロード中...';
      status.style.display = 'block';
      document.getElementById('resultUrl').style.display = 'none';

      const metaUrl = `https://inofo3.github.io/info2/${path}/card.jpg`;
      const siteUrl = `https://inofo3.github.io/info2/${path}/thumb.jpg`;

      try {
        await Promise.all([
          uploadImage(token, `${path}/card.jpg`,  metaFile, true),
          uploadImage(token, `${path}/thumb.jpg`, siteFile, false)
        ]);

        status.textContent = 'HTMLを生成中...';

        await updateFile(token, `${path}/index.html`, buildIndex(title, metaUrl),              `Create ${path}/index.html`);
        await updateFile(token, `${path}/news.html`,  buildNews(title, siteUrl, name, path),  `Create ${path}/news.html`);
        await updateFile(token, `${path}/link.txt`,   yturl,                                  `Set link for ${path}`);

        status.className = 'status ok';
        status.textContent = '✓ 生成完了';
        showLastUpdated();
        document.getElementById('urlOutput').value = `https://inofo3.github.io/info2/${path}/`;
        document.getElementById('resultUrl').style.display = 'block';
        document.getElementById('folder').value = genFolderName();
      } catch (e) {
        status.className = 'status err';
        status.textContent = 'エラー: ' + e.message + (e.stack ? '\n--- stack ---\n' + e.stack : '');
        console.error(e);
      }

      btn.disabled = false;
    }

    async function updateUrl() {
      const token    = document.getElementById('token').value.trim();
      const username = document.getElementById('editUsername').value.trim();
      const folder   = document.getElementById('editFolder').value.trim();
      const newUrl   = document.getElementById('editUrl').value.trim();
      const status   = document.getElementById('editStatus');
      const btn      = document.getElementById('editBtn');

      if (!token || !username || !folder || !newUrl) {
        status.className = 'status err';
        status.textContent = 'Token・ユーザー名・フォルダ名・新しいURLは必須です';
        return;
      }

      const path = `${username}/${folder}`;
      btn.disabled = true;
      status.className = 'status';
      status.textContent = 'URLを変更中...';
      status.style.display = 'block';

      try {
        await updateFile(token, `${path}/link.txt`, newUrl, `Update link for ${path}`);
        status.className = 'status ok';
        status.textContent = '✓ URL変更完了';
        showLastUpdated();
      } catch (e) {
        status.className = 'status err';
        status.textContent = 'エラー: ' + e.message + (e.stack ? '\n--- stack ---\n' + e.stack : '');
        console.error(e);
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
