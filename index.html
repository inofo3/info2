<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Yahoo!ニュース">
  <meta name="twitter:image" content="https://inofo3.github.io/info/card.jpg">

  <title>Yahoo!ニュースに接続中</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      color: #000;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
    .sub { color: #555; font-size: 14px; line-height: 1.8; margin-bottom: 4px; }
    .sub-hint { color: #e00; font-size: 13px; line-height: 1.8; min-height: 20px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #ddd;
      border-top-color: #ff0050;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-wrap {
      margin-top: 36px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .btn-wrap.show {
      opacity: 1;
      transform: translateY(0);
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #ff0050, #ff4081);
      color: #fff;
      text-decoration: none;
      padding: 18px 36px;
      border-radius: 50px;
      font-size: 17px;
      font-weight: bold;
      box-shadow: 0 4px 20px rgba(255,0,80,0.4);
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>リダイレクト中...</h1>
  <p class="sub">接続しています。少々お待ちください</p>
  <p class="sub-hint" id="hint"></p>

  <div class="btn-wrap" id="btnWrap">
    <a href="https://lite.tiktok.com/t/ZS9NVo7mFh1F4-fzOSw/" class="btn">開かない場合はこちらをタップ</a>
  </div>

  <script>
    setTimeout(function () {
      document.getElementById('hint').textContent = '自動で開かない場合は下のボタンからお進みください';
      document.getElementById('btnWrap').classList.add('show');
    }, 1000);
  </script>
</body>
</html>
