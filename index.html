<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub</title>
  <style>
    :root {
      --accent: #a78bfa;
      --accent2: #f472b6;
      --bg: #f5f4f8;
      --card: #fff;
      --border: rgba(167,139,250,0.15);
      --text: #1a1828;
      --sub: #9090b8;
      --dim: #b0aec8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      background-image:
        radial-gradient(ellipse 700px 500px at -10% -5%, rgba(167,139,250,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 500px 400px at 110% 110%, rgba(244,114,182,0.10) 0%, transparent 65%);
    }

    /* ── Auth ── */
    .auth-wrap { width: 100%; max-width: 340px; }
    .auth-logo {
      font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px 24px;
      box-shadow: 0 2px 20px rgba(120,80,200,0.07);
    }
    .tabs {
      display: flex; background: #f5f4f8;
      border-radius: 10px; padding: 3px; margin-bottom: 22px;
    }
    .tab {
      flex: 1; padding: 8px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: none; color: var(--sub); font-family: inherit; transition: all 0.15s;
    }
    .tab.active { background: #fff; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    .afield { margin-bottom: 14px; }
    .afield label { display: block; font-size: 11px; font-weight: 500; color: var(--sub); margin-bottom: 5px; }
    .afield input {
      width: 100%; background: #f8f7fc;
      border: 1.5px solid rgba(167,139,250,0.15);
      color: var(--text); padding: 11px 14px;
      border-radius: 11px; font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit;
    }
    .afield input:focus {
      border-color: rgba(167,139,250,0.5);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
    }
    .auth-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-size: 15px; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer;
      font-family: inherit; margin-top: 4px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .auth-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .auth-btn:active { transform: translateY(0); }
    .auth-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .auth-err { font-size: 12px; color: #ef4444; text-align: center; margin-top: 12px; display: none; }
    .auth-ok  { font-size: 12px; color: #22c55e; text-align: center; margin-top: 12px; display: none; }

    /* ── Hub ── */
    .hub-wrap { display: none; width: 100%; max-width: 480px; }
    .hub-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 36px;
    }
    .hub-title {
      font-size: 24px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hub-user { font-size: 12px; color: var(--sub); margin-top: 3px; }
    .logout-btn {
      background: none; border: 1.5px solid var(--border); color: var(--sub);
      padding: 6px 14px; border-radius: 8px; font-size: 12px;
      cursor: pointer; font-family: inherit; transition: border-color 0.15s, color 0.15s;
    }
    .logout-btn:hover { border-color: rgba(167,139,250,0.4); color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
    }
    a.card {
      display: flex; flex-direction: column; gap: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 22px; padding: 28px 24px;
      text-decoration: none; color: inherit;
      box-shadow: 0 2px 16px rgba(120,80,200,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative; overflow: hidden;
    }
    a.card::after {
      content: ''; position: absolute; inset: 0; border-radius: 22px;
      background: linear-gradient(135deg, rgba(167,139,250,0.06), rgba(244,114,182,0.06));
      opacity: 0; transition: opacity 0.2s;
    }
    a.card:hover { transform: translateY(-4px); box-shadow: 0 10px 36px rgba(120,80,200,0.13); }
    a.card:hover::after { opacity: 1; }
    .card-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, rgba(167,139,250,0.12), rgba(244,114,182,0.12));
      border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .card-title { font-size: 17px; font-weight: 700; color: var(--text); margin-top: 2px; }
    .card-desc  { font-size: 12px; color: var(--sub); line-height: 1.5; }
  </style>
</head>
<body>

  <!-- Auth -->
  <div class="auth-wrap" id="authWrap">
    <div class="auth-logo">✦ Hub</div>
    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" id="tabLogin"    onclick="showTab('login')">ログイン</button>
        <button class="tab"        id="tabRegister" onclick="showTab('register')">新規登録</button>
      </div>

      <div id="loginForm">
        <div class="afield"><label>ユーザー名</label><input type="text" id="loginUser" autocomplete="username"></div>
        <div class="afield"><label>PIN</label><input type="password" id="loginPin" autocomplete="current-password"></div>
        <button class="auth-btn" id="loginBtn" onclick="login()">ログイン</button>
      </div>

      <div id="registerForm" style="display:none">
        <div class="afield"><label>ユーザー名</label><input type="text" id="regUser" autocomplete="username"></div>
        <div class="afield"><label>PIN（4〜8桁の数字）</label><input type="password" id="regPin" autocomplete="new-password" maxlength="8"></div>
        <div class="afield"><label>PIN（確認）</label><input type="password" id="regPin2" autocomplete="new-password" maxlength="8"></div>
        <button class="auth-btn" id="registerBtn" onclick="register()">登録する</button>
      </div>

      <div class="auth-err" id="authErr"></div>
      <div class="auth-ok"  id="authOk"></div>
    </div>
  </div>

  <!-- Hub -->
  <div class="hub-wrap" id="hubWrap">
    <div class="hub-header">
      <div>
        <div class="hub-title">✦ Hub</div>
        <div class="hub-user" id="hubUser"></div>
      </div>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
    <div class="grid">
      <a class="card" href="admin.html">
        <div class="card-icon">⚙️</div>
        <div class="card-title">Admin</div>
        <div class="card-desc">ページ生成・画像編集</div>
      </a>
      <a class="card" href="stats.html">
        <div class="card-icon">📊</div>
        <div class="card-title">Stats</div>
        <div class="card-desc">統計・アナリティクス</div>
      </a>
    </div>
  </div>

  <script>
    const SB  = 'https://qvttkbjxnvsbufaxqpkj.supabase.co';
    const KEY = 'sb_publishable_Ab6lztc5Y2BHT7IRXXrzMg_soFsDudr';

    // セッション復元
    const savedUser = localStorage.getItem('hub_user');
    if (savedUser) showHub(savedUser);

    function showTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginForm').style.display    = isLogin ? 'block' : 'none';
      document.getElementById('registerForm').style.display = isLogin ? 'none'  : 'block';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
      hideMsg();
    }

    function showHub(username) {
      document.getElementById('authWrap').style.display = 'none';
      document.getElementById('hubWrap').style.display  = 'block';
      document.getElementById('hubUser').textContent    = username;
    }

    function hideMsg() {
      document.getElementById('authErr').style.display = 'none';
      document.getElementById('authOk').style.display  = 'none';
    }
    function showErr(msg) {
      const el = document.getElementById('authErr');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('authOk').style.display = 'none';
    }
    function showOk(msg) {
      const el = document.getElementById('authOk');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('authErr').style.display = 'none';
    }

    function saveSession(username) {
      localStorage.setItem('hub_user', username);
      localStorage.setItem('gh_username', username);   // admin の username 欄に自動入力
      sessionStorage.setItem('stats_user', username);  // stats に自動ログイン
    }

    async function login() {
      const username = document.getElementById('loginUser').value.trim();
      const pin      = document.getElementById('loginPin').value.trim();
      const btn      = document.getElementById('loginBtn');
      if (!username || !pin) return;
      btn.disabled = true; hideMsg();
      const res = await fetch(`${SB}/rest/v1/rpc/verify_pin`, {
        method: 'POST',
        headers: { apikey: KEY, Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ p_username: username, p_pin: pin })
      });
      const ok = await res.json();
      if (ok === true) {
        saveSession(username);
        showHub(username);
      } else {
        showErr('ユーザー名またはPINが違います');
      }
      btn.disabled = false;
    }

    async function register() {
      const username = document.getElementById('regUser').value.trim();
      const pin      = document.getElementById('regPin').value.trim();
      const pin2     = document.getElementById('regPin2').value.trim();
      const btn      = document.getElementById('registerBtn');
      if (!username || !pin) return;
      if (pin !== pin2)           { showErr('PINが一致しません'); return; }
      if (!/^\d{4,8}$/.test(pin)) { showErr('PINは4〜8桁の数字にしてください'); return; }
      btn.disabled = true; hideMsg();
      const res = await fetch(`${SB}/rest/v1/rpc/register_user`, {
        method: 'POST',
        headers: { apikey: KEY, Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ p_username: username, p_pin: pin })
      });
      if (res.ok) {
        const result = await res.json();
        if (result === true || result?.success !== false) {
          saveSession(username);
          showHub(username);
        } else {
          showErr(result?.message || 'そのユーザー名は既に使われています');
        }
      } else {
        const err = await res.json().catch(() => ({}));
        showErr(err.message || '登録に失敗しました');
      }
      btn.disabled = false;
    }

    function logout() {
      localStorage.removeItem('hub_user');
      sessionStorage.removeItem('stats_user');
      document.getElementById('hubWrap').style.display  = 'none';
      document.getElementById('authWrap').style.display = 'block';
      document.getElementById('loginPin').value = '';
      hideMsg();
    }

    // Enter キー
    document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPin').focus(); });
    document.getElementById('loginPin').addEventListener('keydown',  e => { if (e.key === 'Enter') login(); });
    document.getElementById('regPin').addEventListener('keydown',    e => { if (e.key === 'Enter') document.getElementById('regPin2').focus(); });
    document.getElementById('regPin2').addEventListener('keydown',   e => { if (e.key === 'Enter') register(); });
  </script>
</body>
</html>
