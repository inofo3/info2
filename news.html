<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>速報ニュース</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #fafafa;
      min-height: 100vh;
      cursor: pointer;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 40px;
    }

    /* Profile */
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #e0e0e0;
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-name {
      font-size: 19px;
      font-weight: 700;
      color: #111;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    /* Video */
    .video-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: #111;
      aspect-ratio: 16/9;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13);
    }
    .video-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.22);
      transition: background 0.2s;
    }
    .play-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .play-btn svg {
      width: 28px;
      height: 28px;
      fill: #111;
      margin-left: 3px;
    }
  </style>
</head>
<body onclick="window.location.href='https://YOUR_YOUTUBE_URL_HERE'">
  <div class="container">

    <div class="avatar">
      <!-- <img src="YOUR_AVATAR.jpg" alt=""> -->
    </div>

    <div class="profile-name">速報ニュース</div>

    <div class="video-wrap">
      <!-- <img src="YOUR_THUMBNAIL.jpg" alt=""> -->
      <div style="width:100%;height:100%;background:#1a1a1a;"></div>
      <div class="video-play">
        <div class="play-btn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
