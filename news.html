<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>速報ニュース</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      cursor: pointer;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      position: relative;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
    }
    .site-name {
      font-size: 18px;
      color: #bbb;
      font-style: italic;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .header-icons {
      display: flex;
      gap: 8px;
    }
    .icon-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-circle svg {
      width: 20px;
      height: 20px;
      fill: #555;
    }

    /* Profile */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px 20px;
    }
    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #e0e0e0;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-name {
      font-size: 18px;
      font-weight: 600;
      color: #222;
    }

    /* Video */
    .video-wrap {
      margin: 0 16px 20px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      background: #000;
      aspect-ratio: 16/9;
    }
    .video-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.25);
    }
    .video-play svg {
      width: 64px;
      height: 64px;
      fill: rgba(255,255,255,0.9);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    }
  </style>
</head>
<body onclick="window.location.href='https://YOUR_YOUTUBE_URL_HERE'">
  <div class="container">

    <div class="header">
      <div class="site-name">Lit.Link</div>
      <div class="header-icons">
        <div class="icon-circle">
          <!-- share icon -->
          <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
        </div>
        <div class="icon-circle">
          <!-- account icon -->
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
      </div>
    </div>

    <div class="profile">
      <div class="avatar">
        <!-- プロフィール画像: <img src="YOUR_AVATAR.jpg" alt=""> -->
      </div>
      <div class="profile-name">速報ニュース</div>
    </div>

    <div class="video-wrap">
      <!-- サムネイル画像: <img src="YOUR_THUMBNAIL.jpg" alt=""> -->
      <div style="width:100%;height:100%;background:#111;"></div>
      <div class="video-play">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </div>

  </div>
</body>
</html>
