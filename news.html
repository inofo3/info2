<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>速報ニュース</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
      cursor: pointer;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    /* Profile */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 16px;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .avatar svg {
      width: 48px;
      height: 48px;
      fill: #fff;
    }
    .account-name {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 2px;
    }
    .account-handle {
      font-size: 14px;
      color: #555;
    }

    /* Banner */
    .banner {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    /* Video player */
    .player {
      background: #000;
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10px;
    }
    .player-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .icon-btn {
      color: #fff;
      font-size: 18px;
      opacity: 0.85;
    }
    .player-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .controls-row {
      display: flex;
      align-items: center;
      gap: 36px;
      margin-bottom: 0;
    }
    .skip-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      font-size: 11px;
      opacity: 0.85;
    }
    .skip-btn svg {
      width: 36px;
      height: 36px;
      fill: #fff;
    }
    .play-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-circle svg {
      width: 28px;
      height: 28px;
      fill: #fff;
      margin-left: 3px;
    }
    .player-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .time {
      color: #fff;
      font-size: 12px;
      white-space: nowrap;
    }
    .progress {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      position: relative;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: #fff;
      border-radius: 2px;
    }
    .more-btn {
      color: #fff;
      font-size: 18px;
      opacity: 0.85;
      width: 26px;
      height: 26px;
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      letter-spacing: -1px;
    }

    /* CTA */
    .cta-wrap {
      padding: 24px 16px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .cta-btn {
      display: block;
      width: 100%;
      max-width: 280px;
      padding: 16px;
      background: #3b1fa3;
      color: #fff;
      font-size: 17px;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      border-radius: 32px;
      margin-bottom: 10px;
    }
    .cta-sub {
      font-size: 12px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body onclick="window.location.href='https://YOUR_YOUTUBE_URL_HERE'">
  <div class="container">

    <div class="profile">
      <div class="avatar">
        <!-- ここをロゴ画像に変えてもOK: <img src="YOUR_LOGO.png" style="width:80px;height:80px;border-radius:50%;"> -->
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <div class="account-name">速報ニュース</div>
      <div class="account-handle">@info4</div>
    </div>

    <div class="banner">【タップで動画再生】</div>

    <div class="player">
      <div class="player-top">
        <div class="icon-btn">⛶</div>
        <div class="icon-btn">🔊</div>
      </div>
      <div class="player-controls">
        <div class="controls-row">
          <div class="skip-btn">
            <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8zm-1.1 11H10v-5.45l-1.6 1.02-.5-.78L10 9.5h.9V16zm3.23 0h-3v-.85h1.05v-4.3l-1.1.68-.43-.7 1.6-1.08h.78v5.4h1.1v.85z"/></svg>
          </div>
          <div class="play-circle">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
          <div class="skip-btn">
            <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8zm-1.1 11H10v-5.45l-1.6 1.02-.5-.78L10 9.5h.9V16zm4.33 0h-3v-.85h1.05v-4.3l-1.1.68-.43-.7 1.6-1.08h.78v5.4h1.1v.85z"/></svg>
          </div>
        </div>
      </div>
      <div class="player-bottom">
        <span class="time">00:00</span>
        <div class="progress"><div class="progress-fill"></div></div>
        <span class="time">-00:05</span>
        <div class="more-btn">···</div>
      </div>
    </div>

    <div class="cta-wrap">
      <a class="cta-btn" href="https://YOUR_YOUTUBE_URL_HERE">続きを読む</a>
      <div class="cta-sub">サービスを提供しています</div>
    </div>

  </div>
</body>
</html>
