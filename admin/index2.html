<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Play Mark — 再生マーク合成</title>

<style>
  :root {
    --bg: #0a0a0a;
    --bg-grad: radial-gradient(ellipse at top, #1a1410 0%, #0a0a0a 60%);
    --card: #131313;
    --card-hover: #1a1a1a;
    --border: #262626;
    --border-bright: #383838;
    --text: #f4f4f4;
    --muted: #777;
    --accent: #f5b942;
    --accent-dim: rgba(245, 185, 66, 0.12);
    --danger: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  body {
    background: var(--bg-grad);
    background-attachment: fixed;
    min-height: 100vh;
    position: relative;
  }

  /* subtle grain */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    z-index: 1;
  }

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 28px 18px 80px;
    position: relative;
    z-index: 2;
  }

  header {
    margin-bottom: 24px;
  }

  .brand {
    display: inline-flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
  }

  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  h1 .accent { color: var(--accent); }

  .badge {
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 3px 7px;
    border-radius: 3px;
  }

  .sub {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }

  /* upload area */
  .drop-zone {
    margin-top: 20px;
    border: 1.5px dashed var(--border-bright);
    border-radius: 12px;
    background: var(--card);
    padding: 48px 20px;
    text-align: center;
    transition: all 0.2s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--card-hover);
  }

  .drop-zone.dragover::after {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--accent-dim);
    pointer-events: none;
  }

  .drop-icon {
    width: 44px;
    height: 44px;
    margin: 0 auto 14px;
    color: var(--muted);
    transition: color 0.2s;
  }

  .drop-zone:hover .drop-icon { color: var(--accent); }

  .drop-text { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .drop-hint { font-size: 12px; color: var(--muted); }

  /* preview */
  .preview-wrap {
    margin-top: 20px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    border: 1px solid var(--border);
    position: relative;
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  /* controls card */
  .panel {
    margin-top: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 14px;
    border-bottom: 1px solid var(--border);
  }

  .row:last-child { border-bottom: none; }

  .row-label {
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .row-label .key {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: #0a0a0a;
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
  }

  /* toggle */
  .switch {
    position: relative;
    width: 38px;
    height: 22px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider {
    position: absolute;
    inset: 0;
    background: #2a2a2a;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .switch .slider::before {
    content: "";
    position: absolute;
    height: 16px;
    width: 16px;
    left: 3px;
    top: 3px;
    background: #888;
    border-radius: 50%;
    transition: 0.2s;
  }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(16px); background: #111; }

  /* text input */
  .text-input {
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Geist Mono', monospace;
    font-size: 14px;
    padding: 8px 10px;
    width: 90px;
    text-align: center;
    transition: border-color 0.15s;
  }
  .text-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .text-input:disabled { opacity: 0.4; }

  /* range */
  .range-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 220px;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: #2a2a2a;
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid #0a0a0a;
    box-shadow: 0 0 0 1px var(--accent);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid #0a0a0a;
  }

  .range-val {
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-width: 32px;
    text-align: right;
  }

  /* actions */
  .actions {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    margin-top: 16px;
  }

  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: 10px;
    padding: 14px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: #1a1108;
    font-weight: 600;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px -8px rgba(245, 185, 66, 0.5); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--border-bright); }

  .hidden { display: none !important; }

  /* footer note */
  footer {
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    font-family: 'Geist Mono', monospace;
  }
  footer .arrow { color: var(--accent); }

  /* fade-in for preview */
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* save modal (long-press fallback for mobile webview) */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .modal-inner {
    max-width: 100%;
    max-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .modal-img {
    max-width: 100%;
    max-height: 70vh;
    border-radius: 8px;
    border: 1px solid var(--border);
    -webkit-touch-callout: default;
    user-select: auto;
    -webkit-user-select: auto;
  }
  .modal-hint {
    font-size: 13px;
    color: var(--text);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 10px 16px;
    border-radius: 8px;
    text-align: center;
    line-height: 1.5;
  }
  .modal-hint .accent { color: var(--accent); font-weight: 600; }
  .modal-close {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
</style>
</head>
<body>
<main>
  <header>
    <div class="brand">
      <h1>Play <span class="accent">Mark</span></h1>
      <span class="badge">v1</span>
    </div>
    <p class="sub">画像に X 風の再生ボタンと時間ラベルを重ねるだけのツール</p>
  </header>

  <!-- Upload -->
  <section id="dropZone" class="drop-zone">
    <input type="file" id="fileInput" accept="image/*" hidden>
    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <div class="drop-text">画像を選ぶ / ここにドロップ</div>
    <div class="drop-hint">PNG · JPG · WEBP</div>
  </section>

  <!-- Preview -->
  <section id="previewWrap" class="preview-wrap hidden fade-in" style="position:relative;">
    <canvas id="canvas" style="display:block;width:100%;height:auto;"></canvas>
    <img id="saveImg" alt="generated"
      style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
             -webkit-touch-callout:default;user-select:auto;-webkit-user-select:auto;
             opacity:0;pointer-events:none;">
  </section>

  <!-- Controls -->
  <section id="controls" class="panel hidden fade-in">
    <div class="row">
      <div class="row-label">時間表示</div>
      <label class="switch">
        <input type="checkbox" id="showDuration" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <div class="row-label">表示テキスト</div>
      <input type="text" id="durationText" class="text-input" value="1:48" maxlength="8">
    </div>

    <div class="row">
      <div class="row-label">ボタンサイズ</div>
      <div class="range-wrap">
        <input type="range" id="btnSize" min="6" max="20" value="12" step="0.5">
        <span class="range-val" id="btnSizeVal">12%</span>
      </div>
    </div>

    <div class="row">
      <div class="row-label">ボタン濃さ</div>
      <div class="range-wrap">
        <input type="range" id="btnOpacity" min="30" max="90" value="60" step="5">
        <span class="range-val" id="btnOpacityVal">60%</span>
      </div>
    </div>
  </section>

  <div id="actions" class="actions hidden">
    <button id="downloadBtn" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      画像を保存
    </button>
    <button id="resetBtn" class="btn-secondary">別の画像</button>
  </div>

  <footer>
    <span class="arrow">→</span> 元画像の解像度のまま書き出します &nbsp;·&nbsp; モバイルは画像を長押しで直接保存できます
  </footer>
</main>

<!-- Save modal (mobile fallback) -->
<div id="saveModal" class="modal-backdrop hidden">
  <div class="modal-inner">
    <img id="saveModalImg" class="modal-img" alt="generated">
    <div class="modal-hint">画像を <span class="accent">長押し</span> → 「画像を保存」</div>
    <button id="saveModalClose" class="modal-close">閉じる</button>
  </div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const previewWrap = document.getElementById('previewWrap');
  const controls = document.getElementById('controls');
  const actionsEl = document.getElementById('actions');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const showDurationEl = document.getElementById('showDuration');
  const durationTextEl = document.getElementById('durationText');
  const btnSizeEl = document.getElementById('btnSize');
  const btnSizeValEl = document.getElementById('btnSizeVal');
  const btnOpacityEl = document.getElementById('btnOpacity');
  const btnOpacityValEl = document.getElementById('btnOpacityVal');
  const downloadBtn = document.getElementById('downloadBtn');
  const resetBtn = document.getElementById('resetBtn');

  let currentImage = null;
  let currentFileName = 'image';

  // --- Upload handling ---
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  ['dragenter', 'dragover'].forEach(ev => {
    dropZone.addEventListener(ev, (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
  });
  ['dragleave', 'drop'].forEach(ev => {
    dropZone.addEventListener(ev, (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
    });
  });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  function loadFile(file) {
    if (!file.type.startsWith('image/')) return;
    currentFileName = (file.name || 'image').replace(/\.[^.]+$/, '');
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        currentImage = img;
        showWorkspace();
        render();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function showWorkspace() {
    dropZone.classList.add('hidden');
    previewWrap.classList.remove('hidden');
    controls.classList.remove('hidden');
    actionsEl.classList.remove('hidden');
  }

  // --- Drawing ---
  const saveImg = document.getElementById('saveImg');

  function render() {
    if (!currentImage) return;
    const w = currentImage.naturalWidth;
    const h = currentImage.naturalHeight;
    canvas.width = w;
    canvas.height = h;

    ctx.drawImage(currentImage, 0, 0, w, h);
    drawPlayButton(ctx, w, h);
    if (showDurationEl.checked && durationTextEl.value.trim()) {
      drawDuration(ctx, w, h, durationTextEl.value.trim());
    }

    // Overlay a real <img> so mobile users can long-press to save
    saveImg.src = canvas.toDataURL('image/png');
    saveImg.style.pointerEvents = 'auto';
  }

  function drawPlayButton(ctx, w, h) {
    const minDim = Math.min(w, h);
    const radius = minDim * (parseFloat(btnSizeEl.value) / 100);
    const cx = w / 2;
    const cy = h / 2;
    const opacity = parseInt(btnOpacityEl.value) / 100;

    // soft outer shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = radius * 0.4;
    ctx.fillStyle = `rgba(0, 0, 0, ${opacity})`;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // white triangle
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    const tri = radius * 0.42;
    // Triangle pointing right, optically centered (slightly nudged right)
    const offsetX = tri * 0.12;
    ctx.moveTo(cx - tri * 0.55 + offsetX, cy - tri);
    ctx.lineTo(cx - tri * 0.55 + offsetX, cy + tri);
    ctx.lineTo(cx + tri + offsetX, cy);
    ctx.closePath();
    ctx.fill();
  }

  function drawDuration(ctx, w, h, text) {
    const minDim = Math.min(w, h);
    const fontSize = Math.max(14, minDim * 0.038);
    const padX = fontSize * 0.7;
    const padY = fontSize * 0.32;
    const margin = minDim * 0.025;

    ctx.font = `600 ${fontSize}px 'Geist', system-ui, sans-serif`;
    ctx.textBaseline = 'middle';

    const metrics = ctx.measureText(text);
    const boxW = metrics.width + padX * 2;
    const boxH = fontSize + padY * 2;
    const x = margin;
    const y = h - margin - boxH;
    const r = Math.min(boxH * 0.25, 8);

    // rounded rect background
    ctx.fillStyle = 'rgba(0, 0, 0, 0.72)';
    roundRect(ctx, x, y, boxW, boxH, r);
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.fillText(text, x + padX, y + boxH / 2);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // --- Control bindings ---
  showDurationEl.addEventListener('change', () => {
    durationTextEl.disabled = !showDurationEl.checked;
    render();
  });
  durationTextEl.addEventListener('input', render);
  btnSizeEl.addEventListener('input', () => {
    btnSizeValEl.textContent = `${btnSizeEl.value}%`;
    render();
  });
  btnOpacityEl.addEventListener('input', () => {
    btnOpacityValEl.textContent = `${btnOpacityEl.value}%`;
    render();
  });

  // --- Save / Download ---
  const saveModal = document.getElementById('saveModal');
  const saveModalImg = document.getElementById('saveModalImg');
  const saveModalClose = document.getElementById('saveModalClose');

  function showSaveModal(blob) {
    if (saveModalImg.dataset.url) URL.revokeObjectURL(saveModalImg.dataset.url);
    const url = URL.createObjectURL(blob);
    saveModalImg.src = url;
    saveModalImg.dataset.url = url;
    saveModal.classList.remove('hidden');
  }

  saveModalClose.addEventListener('click', () => {
    saveModal.classList.add('hidden');
  });
  saveModal.addEventListener('click', (e) => {
    if (e.target === saveModal) saveModal.classList.add('hidden');
  });

  function isMobile() {
    return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  }

  downloadBtn.addEventListener('click', async () => {
    if (!currentImage) return;

    canvas.toBlob(async (blob) => {
      if (!blob) return;
      const file = new File([blob], `${currentFileName}_play.png`, { type: 'image/png' });

      // 1. Try Web Share API (native share sheet on mobile)
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file] });
          return;
        } catch (e) {
          if (e.name === 'AbortError') return;
          // fall through
        }
      }

      // 2. On mobile (no Share API): show modal for long-press save
      if (isMobile()) {
        showSaveModal(blob);
        return;
      }

      // 3. Desktop: traditional download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${currentFileName}_play.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 30000);
    }, 'image/png');
  });

  // --- Reset ---
  resetBtn.addEventListener('click', () => {
    currentImage = null;
    fileInput.value = '';
    dropZone.classList.remove('hidden');
    previewWrap.classList.add('hidden');
    controls.classList.add('hidden');
    actionsEl.classList.add('hidden');
  });
</script>
</body>
</html>
