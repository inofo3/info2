<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounts</title>
  <style>
    :root {
      --accent: #a78bfa;
      --accent2: #f472b6;
      --bg: #f5f4f8;
      --card: #fff;
      --border: rgba(167,139,250,0.15);
      --text: #1a1828;
      --sub: #9090b8;
      --dim: #b0aec8;
      --danger: #ef4444;
      --ok: #22c55e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 24px 16px 40px;
      background-image:
        radial-gradient(ellipse 700px 500px at -10% -5%, rgba(167,139,250,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 500px 400px at 110% 110%, rgba(244,114,182,0.10) 0%, transparent 65%);
    }
    .page { max-width: 680px; margin: 0 auto; }

    /* Header */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; gap: 10px; flex-wrap: wrap;
    }
    .back-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: 1.5px solid var(--border);
      color: var(--sub); padding: 7px 14px; border-radius: 9px;
      font-size: 13px; cursor: pointer; font-family: inherit;
      text-decoration: none; transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .back-btn:hover { border-color: rgba(167,139,250,0.4); color: var(--text); }
    .page-title {
      font-size: 20px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .btn-row { display: flex; gap: 8px; }
    .add-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; padding: 9px 16px;
      border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
    }
    .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .import-btn {
      background: none; border: 1.5px solid var(--border); color: var(--sub);
      padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .import-btn:hover { border-color: rgba(167,139,250,0.4); color: var(--text); }

    /* Account cards */
    .accounts-list { display: flex; flex-direction: column; gap: 12px; }
    .acc-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 18px 20px;
      box-shadow: 0 2px 14px rgba(120,80,200,0.06);
    }
    .acc-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 10px;
    }
    .acc-id {
      font-size: 16px; font-weight: 700; color: #6d5bd0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .acc-header-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .chip {
      background: none; border: 1px solid var(--border); color: var(--sub);
      padding: 4px 10px; border-radius: 7px; font-size: 12px;
      cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .chip:hover { border-color: rgba(167,139,250,0.4); color: var(--text); }
    .chip.del:hover { border-color: var(--danger); color: var(--danger); }
    .chip.copied { border-color: var(--ok); color: var(--ok); }

    /* Field rows */
    .field-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0; border-bottom: 1px solid rgba(167,139,250,0.07);
    }
    .field-row:last-child { border-bottom: none; }
    .field-label {
      font-size: 11px; font-weight: 600; color: var(--sub);
      width: 88px; flex-shrink: 0;
    }
    .field-val {
      flex: 1; font-size: 13px; color: var(--text);
      font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      min-width: 0;
    }
    .field-val.masked { color: var(--dim); letter-spacing: 2px; }
    .field-val.empty { color: var(--dim); font-family: inherit; }
    .field-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      font-size: 13px; padding: 3px 5px; border-radius: 5px;
      color: var(--dim); transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .icon-btn:hover { color: var(--text); background: #f0eef8; }
    .icon-btn.copied { color: var(--ok); }

    .totp-wrap {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .totp-code {
      font-size: 16px; font-weight: 700; letter-spacing: 3px;
      color: #6d5bd0; font-family: monospace;
      background: rgba(109,91,208,0.08); padding: 2px 8px; border-radius: 6px;
      display: none;
    }
    .totp-timer {
      font-size: 10px; color: var(--sub); width: 18px; text-align: center;
      display: none;
    }
    .totp-timer.urgent { color: var(--danger); }
    .gen-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; padding: 3px 9px; border-radius: 6px;
      font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
      white-space: nowrap;
    }
    .gen-btn:hover { opacity: 0.85; }

    .empty-state {
      text-align: center; padding: 60px 16px; color: var(--sub); font-size: 14px;
    }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(26,24,40,0.45); backdrop-filter: blur(4px);
      z-index: 100; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border-radius: 22px;
      padding: 28px 24px; width: 100%; max-width: 460px;
      box-shadow: 0 20px 60px rgba(100,60,180,0.18);
      max-height: 92vh; overflow-y: auto;
    }
    .modal-title {
      font-size: 17px; font-weight: 800; margin-bottom: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .mfield { margin-bottom: 13px; }
    .mfield label { display: block; font-size: 11px; font-weight: 600; color: var(--sub); margin-bottom: 5px; }
    .mfield-row { position: relative; }
    .mfield input {
      width: 100%; background: #f8f7fc;
      border: 1.5px solid rgba(167,139,250,0.15);
      color: var(--text); padding: 10px 38px 10px 13px;
      border-radius: 10px; font-size: 13px; outline: none;
      transition: border-color 0.2s; font-family: monospace;
    }
    .mfield input:focus { border-color: rgba(167,139,250,0.5); }
    .vis-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--sub); font-size: 14px; padding: 2px;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
    .cancel-btn {
      background: none; border: 1.5px solid var(--border); color: var(--sub);
      padding: 10px 18px; border-radius: 10px; font-size: 14px;
      cursor: pointer; font-family: inherit;
    }
    .cancel-btn:hover { border-color: rgba(167,139,250,0.4); color: var(--text); }
    .save-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; padding: 10px 22px;
      border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .save-btn:hover { opacity: 0.88; }

    /* Import textarea */
    .import-textarea {
      width: 100%; min-height: 140px; background: #f8f7fc;
      border: 1.5px solid rgba(167,139,250,0.15);
      color: var(--text); padding: 10px 13px;
      border-radius: 10px; font-size: 12px; font-family: monospace;
      outline: none; resize: vertical; transition: border-color 0.2s;
    }
    .import-textarea:focus { border-color: rgba(167,139,250,0.5); }
    .import-hint { font-size: 11px; color: var(--sub); margin-top: 6px; line-height: 1.6; }
    .import-result { font-size: 12px; margin-top: 10px; color: var(--ok); display: none; }

    @media (max-width: 480px) {
      .page-header { gap: 8px; }
      .page-title { font-size: 17px; }
      .btn-row { gap: 6px; }
      .add-btn, .import-btn { padding: 8px 12px; font-size: 12px; }
      .acc-card { padding: 14px 14px; }
      .acc-id { font-size: 14px; }
      .field-label { width: 72px; font-size: 10px; }
      .field-val { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <a class="back-btn" href="index.html">← Hub</a>
      <div class="page-title">🔑 Accounts</div>
      <div class="btn-row">
        <button class="import-btn" onclick="openImport()">📋 インポート</button>
        <button class="add-btn" onclick="openModal()">＋ 追加</button>
      </div>
    </div>

    <div class="accounts-list" id="accountsList">
      <div class="empty-state">アカウントがありません</div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-overlay" id="importOverlay">
    <div class="modal">
      <div class="modal-title">📋 一括インポート</div>
      <textarea class="import-textarea" id="importText"
        placeholder="1行に1アカウント（コロン区切り）

ID:Password:Email:EmailPassword:FaKey:AuthToken"></textarea>
      <div class="import-hint">フォーマット: ID : Password : Email : EmailPassword : FaKey : AuthToken</div>
      <div class="import-result" id="importResult"></div>
      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeImport()">キャンセル</button>
        <button class="save-btn" onclick="doImport()">インポート</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">アカウント追加</div>
      <input type="hidden" id="editIndex">

      <div class="mfield">
        <label>ID（ユーザー名）</label>
        <div class="mfield-row"><input type="text" id="fId" autocomplete="off" placeholder="@username"></div>
      </div>
      <div class="mfield">
        <label>Password</label>
        <div class="mfield-row">
          <input type="password" id="fPassword" autocomplete="off">
          <button class="vis-btn" type="button" onclick="toggleVis('fPassword',this)">👁</button>
        </div>
      </div>
      <div class="mfield">
        <label>Email</label>
        <div class="mfield-row"><input type="text" id="fEmail" autocomplete="off"></div>
      </div>
      <div class="mfield">
        <label>Email Password</label>
        <div class="mfield-row">
          <input type="password" id="fEmailPassword" autocomplete="off">
          <button class="vis-btn" type="button" onclick="toggleVis('fEmailPassword',this)">👁</button>
        </div>
      </div>
      <div class="mfield">
        <label>FaKey（2FA）</label>
        <div class="mfield-row">
          <input type="password" id="fFaKey" autocomplete="off" placeholder="TOTPシークレット">
          <button class="vis-btn" type="button" onclick="toggleVis('fFaKey',this)">👁</button>
        </div>
      </div>
      <div class="mfield">
        <label>Auth Token</label>
        <div class="mfield-row">
          <input type="password" id="fAuthToken" autocomplete="off">
          <button class="vis-btn" type="button" onclick="toggleVis('fAuthToken',this)">👁</button>
        </div>
      </div>

      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeModal()">キャンセル</button>
        <button class="save-btn" onclick="saveAccount()">保存</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'hub_accounts';
    const FIELDS = [
      { key: 'id',            label: 'ID',         secret: false },
      { key: 'password',      label: 'Password',   secret: true  },
      { key: 'email',         label: 'Email',      secret: false },
      { key: 'emailPassword', label: 'Email Pass', secret: true  },
      { key: 'faKey',         label: 'FaKey',      secret: true  },
      { key: 'authToken',     label: 'Auth Token', secret: true  },
    ];

    function loadAccounts() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function saveAccounts(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }

    function mask(str) {
      if (!str) return null;
      if (str.length <= 4) return '••••';
      return str.slice(0, 2) + '••••' + str.slice(-2);
    }

    function render() {
      const list = loadAccounts();
      const container = document.getElementById('accountsList');
      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state">アカウントがありません</div>';
        return;
      }
      container.innerHTML = list.map((a, i) => {
        const rows = FIELDS.map(f => {
          const val = a[f.key] || '';
          const display = val
            ? (f.secret ? `<span class="field-val masked" id="fv-${i}-${f.key}">${mask(val)}</span>`
                        : `<span class="field-val" id="fv-${i}-${f.key}">${esc(val)}</span>`)
            : `<span class="field-val empty">—</span>`;
          const visBtn = f.secret && val
            ? `<button class="icon-btn" onclick="toggleFieldVis(${i},'${f.key}')" title="表示">👁</button>`
            : '';
          const copyBtn = val
            ? `<button class="icon-btn" id="cp-${i}-${f.key}" onclick="copyField(${i},'${f.key}')" title="コピー">📋</button>`
            : '';
          const totpBtn = f.key === 'faKey' && val ? `
            <div class="totp-wrap">
              <span class="totp-code" id="totp-code-${i}"></span>
              <span class="totp-timer" id="totp-timer-${i}"></span>
              <button class="gen-btn" onclick="generateTOTP(${i})">生成</button>
            </div>` : '';
          return `
            <div class="field-row">
              <span class="field-label">${f.label}</span>
              ${display}
              <div class="field-actions">${visBtn}${copyBtn}</div>
              ${totpBtn}
            </div>`;
        }).join('');

        return `
          <div class="acc-card">
            <div class="acc-card-header">
              <div class="acc-id">@${esc(a.id || '—')}</div>
              <div class="acc-header-actions">
                <button class="chip" id="cpall-${i}" onclick="copyAll(${i})">全コピー</button>
                <button class="chip" onclick="openModal(${i})">編集</button>
                <button class="chip del" onclick="deleteAccount(${i})">削除</button>
              </div>
            </div>
            ${rows}
          </div>`;
      }).join('');
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // フィールドの表示/非表示トグル
    const _visible = {};
    function toggleFieldVis(i, key) {
      const k = `${i}-${key}`;
      const list = loadAccounts();
      const val = list[i][key] || '';
      const el = document.getElementById(`fv-${i}-${key}`);
      if (!el) return;
      _visible[k] = !_visible[k];
      if (_visible[k]) {
        el.textContent = val;
        el.classList.remove('masked');
      } else {
        el.textContent = mask(val);
        el.classList.add('masked');
      }
    }

    function copyField(i, key) {
      const list = loadAccounts();
      const val = list[i][key] || '';
      if (!val) return;
      navigator.clipboard.writeText(val).then(() => {
        const btn = document.getElementById(`cp-${i}-${key}`);
        if (!btn) return;
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
      });
    }

    function copyAll(i) {
      const list = loadAccounts();
      const a = list[i];
      const text = [a.id, a.password, a.email, a.emailPassword, a.faKey, a.authToken].join(':');
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById(`cpall-${i}`);
        if (!btn) return;
        btn.textContent = '✓ コピー済';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '全コピー'; btn.classList.remove('copied'); }, 1500);
      });
    }

    function deleteAccount(i) {
      const list = loadAccounts();
      if (!confirm(`@${list[i]?.id || i} を削除しますか？`)) return;
      list.splice(i, 1);
      saveAccounts(list);
      render();
    }

    // ── Modal ──
    function openModal(index) {
      ['Id','Password','Email','EmailPassword','FaKey','AuthToken'].forEach(f => {
        const el = document.getElementById('f' + f);
        el.value = '';
        if (el.type === 'password') el.type = 'password';
      });
      document.getElementById('editIndex').value = '';
      document.getElementById('modalTitle').textContent = 'アカウント追加';

      if (index !== undefined) {
        const a = loadAccounts()[index];
        document.getElementById('modalTitle').textContent = 'アカウント編集';
        document.getElementById('editIndex').value = index;
        document.getElementById('fId').value            = a.id            || '';
        document.getElementById('fPassword').value      = a.password      || '';
        document.getElementById('fEmail').value         = a.email         || '';
        document.getElementById('fEmailPassword').value = a.emailPassword || '';
        document.getElementById('fFaKey').value         = a.faKey         || '';
        document.getElementById('fAuthToken').value     = a.authToken     || '';
      }
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('fId').focus();
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    function saveAccount() {
      const account = {
        id:            document.getElementById('fId').value.trim(),
        password:      document.getElementById('fPassword').value,
        email:         document.getElementById('fEmail').value.trim(),
        emailPassword: document.getElementById('fEmailPassword').value,
        faKey:         document.getElementById('fFaKey').value.trim(),
        authToken:     document.getElementById('fAuthToken').value.trim(),
      };
      if (!account.id) { document.getElementById('fId').focus(); return; }
      const list = loadAccounts();
      const idx  = document.getElementById('editIndex').value;
      if (idx !== '') list[parseInt(idx)] = account; else list.push(account);
      saveAccounts(list);
      closeModal();
      render();
    }

    function toggleVis(id, btn) {
      const input = document.getElementById(id);
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁';
    }

    // ── Import ──
    // ── TOTP ──
    const _totpTimers = {};

    async function generateTOTP(i) {
      const list = loadAccounts();
      const secret = (list[i]?.faKey || '').toUpperCase().replace(/\s/g, '');
      if (!secret) return;

      // base32 decode
      const B32 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
      let bits = 0, val = 0;
      const bytes = [];
      for (const ch of secret) {
        const idx = B32.indexOf(ch);
        if (idx < 0) continue;
        val = (val << 5) | idx; bits += 5;
        if (bits >= 8) { bytes.push((val >>> (bits - 8)) & 0xff); bits -= 8; }
      }

      const keyBytes = new Uint8Array(bytes);
      const counter  = Math.floor(Date.now() / 1000 / 30);
      const ctrBuf   = new Uint8Array(8);
      let tmp = counter;
      for (let j = 7; j >= 0; j--) { ctrBuf[j] = tmp & 0xff; tmp = Math.floor(tmp / 256); }

      const cryptoKey = await crypto.subtle.importKey(
        'raw', keyBytes, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']
      );
      const hmac   = new Uint8Array(await crypto.subtle.sign('HMAC', cryptoKey, ctrBuf));
      const offset = hmac[19] & 0xf;
      const code   = (
        ((hmac[offset]   & 0x7f) << 24) |
        ((hmac[offset+1] & 0xff) << 16) |
        ((hmac[offset+2] & 0xff) <<  8) |
         (hmac[offset+3] & 0xff)
      ) % 1_000_000;
      const codeStr = String(code).padStart(6, '0');

      const codeEl  = document.getElementById(`totp-code-${i}`);
      const timerEl = document.getElementById(`totp-timer-${i}`);
      if (!codeEl) return;

      codeEl.textContent = codeStr.slice(0, 3) + ' ' + codeStr.slice(3);
      codeEl.style.display = 'inline';
      timerEl.style.display = 'inline';

      navigator.clipboard.writeText(codeStr).catch(() => {});

      // 既存タイマーをクリア
      if (_totpTimers[i]) clearInterval(_totpTimers[i]);

      function tick() {
        const rem = 30 - (Math.floor(Date.now() / 1000) % 30);
        timerEl.textContent = rem + 's';
        timerEl.className = 'totp-timer' + (rem <= 5 ? ' urgent' : '');
        if (rem === 30) {
          // コードが切り替わったので再生成
          clearInterval(_totpTimers[i]);
          codeEl.style.display = 'none';
          timerEl.style.display = 'none';
        }
      }
      tick();
      _totpTimers[i] = setInterval(tick, 1000);
    }

    function openImport() {
      document.getElementById('importText').value = '';
      document.getElementById('importResult').style.display = 'none';
      document.getElementById('importOverlay').classList.add('open');
      document.getElementById('importText').focus();
    }
    function closeImport() { document.getElementById('importOverlay').classList.remove('open'); }

    function doImport() {
      const lines = document.getElementById('importText').value
        .split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
      const list = loadAccounts();
      let added = 0, skipped = 0;
      for (const line of lines) {
        const parts = line.split(':');
        if (parts.length < 2 || !parts[0]) { skipped++; continue; }
        list.push({
          id: parts[0], password: parts[1] || '', email: parts[2] || '',
          emailPassword: parts[3] || '', faKey: parts[4] || '', authToken: parts[5] || '',
        });
        added++;
      }
      saveAccounts(list);
      render();
      const result = document.getElementById('importResult');
      result.textContent = `✅ ${added}件インポート完了${skipped ? `（${skipped}件スキップ）` : ''}`;
      result.style.display = 'block';
      if (added > 0) setTimeout(closeImport, 1200);
    }

    document.getElementById('importOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeImport(); });
    document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    if (!localStorage.getItem('hub_user')) location.href = 'index.html';

    render();
  </script>
</body>
</html>
