<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ログイン画面 */
    .login-wrap {
      max-width: 320px;
      margin: 80px auto 0;
    }
    .login-wrap h1 { font-size: 18px; color: #aaa; margin-bottom: 24px; text-align: center; }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .lfield { margin-bottom: 14px; }
    .lfield label { display: block; font-size: 11px; color: #aaa; margin-bottom: 6px; }
    .lfield input {
      width: 100%;
      background: #f2f2f7;
      border: none;
      color: #111;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #111;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 4px;
    }
    .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .login-err { font-size: 12px; color: #ef4444; margin-top: 10px; text-align: center; display: none; }

    /* Stats 画面 */
    .stats-wrap { display: none; max-width: 600px; margin: 0 auto; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .topbar h1 { font-size: 16px; color: #aaa; }
    .logout-btn {
      background: none;
      border: 1px solid #ddd;
      color: #aaa;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 20px 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .metrics { display: flex; margin-bottom: 20px; }
    .metric { flex: 1; padding-bottom: 10px; border-bottom: 2px solid #eee; cursor: pointer; }
    .metric.active { border-bottom-color: #3b82f6; }
    .metric-label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .metric.active .metric-label { color: #3b82f6; }
    .metric-value { font-size: 22px; font-weight: 600; color: #111; }
    .chart-wrap { position: relative; height: 160px; }

    .site-card {
      background: #fff;
      border-radius: 16px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .site-row { display: flex; align-items: center; padding: 12px 14px; gap: 10px; }
    .site-thumb {
      width: 52px; height: 52px; border-radius: 9px;
      object-fit: cover; flex-shrink: 0; background: #f2f2f7;
    }
    .site-info { flex: 1; min-width: 0; }
    .site-path { font-size: 13px; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .site-path span { color: #aaa; margin: 0 4px; }
    .site-nums { display: flex; gap: 14px; margin-top: 4px; }
    .site-num { font-size: 12px; color: #888; }
    .site-num b { color: #111; font-weight: 600; }
    .ctr-high b { color: #22c55e; }
    .ctr-mid  b { color: #f59e0b; }
    .ctr-low  b { color: #ef4444; }
    .pv-h-badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      color: #3b82f6; background: rgba(59,130,246,0.08);
      padding: 1px 7px; border-radius: 20px; white-space: nowrap;
    }
    .pv-h-badge.zero { color: #bbb; background: #f5f5f5; }
    .copy-btn {
      flex-shrink: 0; padding: 6px 11px;
      background: #f2f2f7; border: none; border-radius: 8px;
      font-size: 12px; color: #888; font-weight: 600; cursor: pointer;
      transition: color 0.15s;
    }
    .copy-btn.copied { color: #22c55e; }
    .url-btn {
      flex-shrink: 0; padding: 6px 11px;
      background: #f2f2f7; border: none; border-radius: 8px;
      font-size: 12px; color: #888; font-weight: 600; cursor: pointer; margin-left: 4px;
    }
    .url-btn:hover { background: #e5e5ec; color: #555; }
    .edit-wrap { display: none; padding: 12px 16px 14px; border-top: 1px solid #f2f2f7; }
    .edit-wrap.open { display: block; }
    .edit-lbl { font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .edit-input {
      width: 100%; background: #f2f2f7; border: none; color: #111;
      padding: 10px 12px; border-radius: 8px; font-size: 13px; outline: none;
      margin-bottom: 8px; font-family: inherit;
    }
    .edit-input:focus { box-shadow: 0 0 0 2px rgba(59,130,246,0.18); }
    .edit-btns { display: flex; gap: 6px; }
    .edit-ok {
      flex: 1; padding: 9px; background: #111; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .edit-ok:disabled { opacity: 0.4; cursor: not-allowed; }
    .edit-cancel {
      padding: 9px 14px; background: #f2f2f7; color: #888;
      border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit;
    }
    .edit-st { font-size: 12px; margin-top: 8px; display: none; }
    .edit-st.ok  { color: #22c55e; display: block; }
    .edit-st.err { color: #ef4444; display: block; }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div class="login-wrap" id="loginWrap">
    <h1>Stats</h1>
    <div class="login-card">
      <div class="lfield">
        <label>ユーザー名</label>
        <input type="text" id="loginUser" placeholder="例: taro" autocomplete="username">
      </div>
      <div class="lfield">
        <label>PIN</label>
        <input type="password" id="loginPin" placeholder="••••" autocomplete="current-password">
      </div>
      <button class="login-btn" id="loginBtn" onclick="login()">ログイン</button>
      <div class="login-err" id="loginErr">ユーザー名またはPINが違います</div>
    </div>
  </div>

  <!-- Stats 画面 -->
  <div class="stats-wrap" id="statsWrap">
    <div class="topbar">
      <h1 id="statsTitle">Stats</h1>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>

    <div class="card">
      <div class="metrics">
        <div class="metric active" onclick="switchMetric('pv', this)">
          <div class="metric-label">PV</div>
          <div class="metric-value" id="m-pv">—</div>
        </div>
        <div class="metric" onclick="switchMetric('ct', this)">
          <div class="metric-label">CT</div>
          <div class="metric-value" id="m-ct">—</div>
        </div>
        <div class="metric" onclick="switchMetric('pv', this)">
          <div class="metric-label">CTR</div>
          <div class="metric-value" id="m-ctr">—</div>
        </div>
        <div class="metric" onclick="switchMetric('ct', this)">
          <div class="metric-label">推定CT/h</div>
          <div class="metric-value" id="m-cth">—</div>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-overall"></canvas>
      </div>
    </div>

    <div id="site-list"></div>
  </div>

  <script>
    const SB     = 'https://qvttkbjxnvsbufaxqpkj.supabase.co';
    const KEY    = 'sb_publishable_Ab6lztc5Y2BHT7IRXXrzMg_soFsDudr';
    const OWNER  = 'inofo3';
    const REPO   = 'info2';
    const BRANCH = 'main';

    function copyUrl(path, btn) {
      const url = `https://click-click.site/${path}/`;
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1600);
      });
    }

    function toggleEdit(eid) {
      const wrap = document.getElementById('edit-' + eid);
      const opening = !wrap.classList.contains('open');
      document.querySelectorAll('.edit-wrap.open').forEach(w => w.classList.remove('open'));
      if (opening) wrap.classList.add('open');
    }

    async function saveLink(sitePath, eid) {
      const wrap   = document.getElementById('edit-' + eid);
      const token  = wrap.querySelector('.edit-tok').value.trim();
      const newUrl = wrap.querySelector('.edit-url').value.trim();
      const status = document.getElementById('editst-' + eid);
      const btn    = wrap.querySelector('.edit-ok');
      if (!token || !newUrl) {
        status.textContent = 'TokenとURLを入力してください';
        status.className = 'edit-st err';
        return;
      }
      btn.disabled = true;
      status.textContent = '更新中...';
      status.className = 'edit-st';
      status.style.display = 'block';
      try {
        const filePath = `${sitePath}/link.txt`;
        const shaRes = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}?ref=${BRANCH}&t=${Date.now()}`,
          { headers: { Authorization: `token ${token}` } }
        );
        const sha  = shaRes.ok ? (await shaRes.json()).sha : null;
        const body = { message: `Update link for ${sitePath}`, content: btoa(unescape(encodeURIComponent(newUrl))), branch: BRANCH };
        if (sha) body.sha = sha;
        const res = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`,
          { method: 'PUT', headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
        );
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `HTTP ${res.status}`); }
        localStorage.setItem('gh_token', token);
        status.textContent = '✓ 変更しました';
        status.className = 'edit-st ok';
        wrap.querySelector('.edit-url').value = '';
        setTimeout(() => { wrap.classList.remove('open'); status.style.display = 'none'; }, 1800);
      } catch (e) {
        status.textContent = 'エラー: ' + e.message;
        status.className = 'edit-st err';
      }
      btn.disabled = false;
    }

    let currentUser  = null;
    let overallChart = null;
    let pvByHour = {}, ctByHour = {};
    let pvByPath = {}, ctByPath = {};
    let hourLabels   = [];
    let estimatedCtPerHour = 0;

    // hub or セッションでログイン済みならスキップ
    const saved = sessionStorage.getItem('stats_user') || localStorage.getItem('hub_user');
    if (saved) showStats(saved);

    async function login() {
      const username = document.getElementById('loginUser').value.trim();
      const pin      = document.getElementById('loginPin').value.trim();
      const btn      = document.getElementById('loginBtn');
      const err      = document.getElementById('loginErr');

      if (!username || !pin) return;
      btn.disabled = true;
      err.style.display = 'none';

      const res = await fetch(`${SB}/rest/v1/rpc/verify_pin`, {
        method: 'POST',
        headers: { apikey: KEY, Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ p_username: username, p_pin: pin })
      });
      const ok = await res.json();

      if (ok === true) {
        sessionStorage.setItem('stats_user', username);
        showStats(username);
      } else {
        err.style.display = 'block';
      }
      btn.disabled = false;
    }

    document.getElementById('loginPin').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function logout() {
      sessionStorage.removeItem('stats_user');
      document.getElementById('loginWrap').style.display = 'block';
      document.getElementById('statsWrap').style.display = 'none';
      currentUser = null;
      if (overallChart) { overallChart.destroy(); overallChart = null; }
    }

    function showStats(username) {
      currentUser = username;
      document.getElementById('loginWrap').style.display  = 'none';
      document.getElementById('statsWrap').style.display  = 'block';
      document.getElementById('statsTitle').textContent   = username;
      loadStats();
    }

    function buildHourMap() {
      const map  = {};
      const base = new Date();
      base.setMinutes(0, 0, 0);
      for (let i = 23; i >= 0; i--) {
        const d = new Date(base.getTime() - i * 3600000);
        map[`${d.getHours()}時`] = 0;
      }
      return map;
    }

    function makeChartConfig(labels, data, refValue) {
      const datasets = [{
        data,
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59,130,246,0.08)',
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 4,
        fill: true,
        tension: 0.3,
      }];
      if (refValue != null) {
        datasets.push({
          data: new Array(labels.length).fill(refValue),
          borderColor: 'rgba(245,158,11,0.6)',
          borderWidth: 1.2,
          borderDash: [5, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          hidden: true,
        });
      }
      return {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              filter: item => item.datasetIndex === 0,
              callbacks: {
                title: items => items[0].label,
                label: item => `  ${item.raw} 人`
              },
              backgroundColor: 'rgba(17,17,17,0.82)',
              padding: { x: 12, y: 8 },
              titleFont: { size: 11 },
              bodyFont: { size: 14, weight: '700' },
              displayColors: false,
              cornerRadius: 8,
            }
          },
          scales: {
            x: {
              grid: { display: false },
              border: { display: false },
              ticks: { maxTicksLimit: 8, color: '#bbb', font: { size: 10 } }
            },
            y: {
              position: 'right',
              grid: { color: '#f5f5f5' },
              border: { display: false },
              ticks: { precision: 0, color: '#bbb', font: { size: 10 } },
              min: 0
            }
          }
        }
      };
    }

    function switchMetric(type, el) {
      document.querySelectorAll('.metric').forEach(m => m.classList.remove('active'));
      el.classList.add('active');
      overallChart.data.datasets[0].data = Object.values(type === 'ct' ? ctByHour : pvByHour);
      if (overallChart.data.datasets.length > 1) {
        overallChart.data.datasets[1].hidden = (type !== 'ct');
      }
      overallChart.update();
    }

function buildSiteList(stats) {
      const list   = document.getElementById('site-list');
      list.innerHTML = '';
      const sorted = [...stats].sort((a, b) => {
        const fa = a.path.split('/')[1] ?? a.path;
        const fb = b.path.split('/')[1] ?? b.path;
        return fb.localeCompare(fa);
      });

      const curHourKey = hourLabels[hourLabels.length - 1];

      for (const r of sorted) {
        const folder   = r.path.split('/')[1] ?? r.path;
        const ctr      = r.pv > 0 ? Math.round(r.ct / r.pv * 100) : 0;
        const cls      = ctr >= 30 ? 'ctr-high' : ctr >= 15 ? 'ctr-mid' : 'ctr-low';
        const eid      = r.path.replace(/\//g, '-');
        const thumbUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/a/${folder}/card.jpg`;
        const pvH      = pvByPath[r.path]?.[curHourKey] ?? 0;
        const ctH      = ctByPath[r.path]?.[curHourKey] ?? 0;
        const badgeCls = pvH > 0 ? '' : 'zero';
        const badgeTxt = pvH > 0 ? `+${pvH} PV${ctH > 0 ? ' / +' + ctH + ' CT' : ''}` : `+0/h`;
        const card     = document.createElement('div');
        card.className = 'site-card';
        card.innerHTML = `
          <div class="site-row">
            <img class="site-thumb" src="${thumbUrl}" loading="lazy" onerror="this.style.display='none'">
            <div class="site-info">
              <div class="site-path">${folder}</div>
              <div class="site-nums">
                <div class="site-num">PV <b>${r.pv.toLocaleString()}</b></div>
                <div class="site-num">CT <b>${r.ct.toLocaleString()}</b></div>
                <div class="site-num ${cls}">CTR <b>${ctr}%</b></div>
                <span class="pv-h-badge ${badgeCls}">${badgeTxt}</span>
              </div>
            </div>
            <button class="copy-btn" onclick="copyUrl('${r.path}', this)">コピー</button>
            <button class="url-btn" onclick="toggleEdit('${eid}')">URL</button>
          </div>
          <div class="edit-wrap" id="edit-${eid}">
            <div class="edit-lbl">GitHub Token</div>
            <input type="password" class="edit-input edit-tok" placeholder="ghp_xxxx" value="${localStorage.getItem('gh_token') || ''}">
            <div class="edit-lbl">新しいリンク先URL</div>
            <input type="url" class="edit-input edit-url" placeholder="https://...">
            <div class="edit-btns">
              <button class="edit-ok" onclick="saveLink('${r.path}','${eid}')">変更する</button>
              <button class="edit-cancel" onclick="toggleEdit('${eid}')">キャンセル</button>
            </div>
            <div class="edit-st" id="editst-${eid}"></div>
          </div>`;
        list.appendChild(card);
      }
    }

    async function loadStats() {
      const since = new Date();
      since.setHours(since.getHours() - 23);
      since.setMinutes(0, 0, 0);

      const prefix = encodeURIComponent(`${currentUser}/`);

      const [statsRes, eventsRes] = await Promise.all([
        fetch(`${SB}/rest/v1/stats?path=like.${prefix}*&select=*`, {
          headers: { apikey: KEY, Authorization: `Bearer ${KEY}` }
        }),
        fetch(`${SB}/rest/v1/events?path=like.${prefix}*&created_at=gte.${since.toISOString()}&select=created_at,type,path&order=created_at&limit=10000`, {
          headers: { apikey: KEY, Authorization: `Bearer ${KEY}` }
        })
      ]);

      const stats  = await statsRes.json();
      const events = await eventsRes.json();

      const totalPv = stats.reduce((s, r) => s + r.pv, 0);
      const totalCt = stats.reduce((s, r) => s + r.ct, 0);
      const ctr     = totalPv > 0 ? (totalCt / totalPv * 100).toFixed(2) : '0.00';

      document.getElementById('m-pv').textContent  = totalPv.toLocaleString();
      document.getElementById('m-ct').textContent  = totalCt.toLocaleString();
      document.getElementById('m-ctr').textContent = ctr + '%';

      pvByHour = buildHourMap();
      ctByHour = buildHourMap();
      pvByPath = {};
      ctByPath = {};

      for (const e of events) {
        const d   = new Date(e.created_at);
        const key = `${d.getHours()}時`;
        if (e.type === 'pv') {
          if (key in pvByHour) pvByHour[key]++;
          if (!pvByPath[e.path]) pvByPath[e.path] = buildHourMap();
          if (key in pvByPath[e.path]) pvByPath[e.path][key]++;
        } else {
          if (key in ctByHour) ctByHour[key]++;
          if (!ctByPath[e.path]) ctByPath[e.path] = buildHourMap();
          if (key in ctByPath[e.path]) ctByPath[e.path][key]++;
        }
      }

      hourLabels = Object.keys(pvByHour);

      const ctEventTotal = Object.values(ctByHour).reduce((s, v) => s + v, 0);
      const nowRef = new Date();
      const effectiveHours = 23 + (nowRef.getMinutes() + nowRef.getSeconds() / 60) / 60;
      estimatedCtPerHour = +(ctEventTotal / Math.max(effectiveHours, 1)).toFixed(1);
      document.getElementById('m-cth').textContent = estimatedCtPerHour;

      if (overallChart) overallChart.destroy();
      overallChart = new Chart(
        document.getElementById('chart-overall'),
        makeChartConfig(hourLabels, Object.values(pvByHour), estimatedCtPerHour)
      );

      buildSiteList(stats);
    }
  </script>
</body>
</html>
