<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 20px 16px;
      max-width: 600px;
      margin: 0 auto 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    /* サマリー */
    .metrics {
      display: flex;
      margin-bottom: 20px;
    }
    .metric {
      flex: 1;
      padding-bottom: 10px;
      border-bottom: 2px solid #eee;
      cursor: pointer;
    }
    .metric.active { border-bottom-color: #3b82f6; }
    .metric-label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .metric.active .metric-label { color: #3b82f6; }
    .metric-value { font-size: 22px; font-weight: 600; color: #111; }
    .chart-wrap { position: relative; height: 160px; }

    /* サイト一覧 */
    .site-card {
      background: #fff;
      border-radius: 16px;
      max-width: 600px;
      margin: 0 auto 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .site-row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 12px;
    }
    .site-info { flex: 1; min-width: 0; }
    .site-path {
      font-size: 13px;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .site-path span { color: #aaa; margin: 0 4px; }
    .site-nums {
      display: flex;
      gap: 14px;
      margin-top: 4px;
    }
    .site-num { font-size: 12px; color: #888; }
    .site-num b { color: #111; font-weight: 600; }
    .ctr-high b { color: #22c55e; }
    .ctr-mid  b { color: #f59e0b; }
    .ctr-low  b { color: #ef4444; }
    .graph-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      background: #f2f2f7;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      color: #3b82f6;
      font-weight: 600;
      cursor: pointer;
    }
    .graph-btn:hover { background: #e5e7eb; }
    .site-chart-wrap {
      display: none;
      padding: 0 16px 16px;
      height: 130px;
      position: relative;
    }
    .site-chart-wrap.open { display: block; }
  </style>
</head>
<body>

  <!-- サマリーカード -->
  <div class="card">
    <div class="metrics">
      <div class="metric active" onclick="switchMetric('pv', this)">
        <div class="metric-label">User</div>
        <div class="metric-value" id="m-user">—</div>
      </div>
      <div class="metric" onclick="switchMetric('pv', this)">
        <div class="metric-label">PV</div>
        <div class="metric-value" id="m-pv">—</div>
      </div>
      <div class="metric" onclick="switchMetric('ct', this)">
        <div class="metric-label">CT</div>
        <div class="metric-value" id="m-ct">—</div>
      </div>
      <div class="metric" onclick="switchMetric('pv', this)">
        <div class="metric-label">CTR</div>
        <div class="metric-value" id="m-ctr">—</div>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart-overall"></canvas>
    </div>
  </div>

  <!-- サイト一覧 -->
  <div id="site-list"></div>

  <script>
    const SB  = 'https://qvttkbjxnvsbufaxqpkj.supabase.co';
    const KEY = 'sb_publishable_Ab6lztc5Y2BHT7IRXXrzMg_soFsDudr';

    let overallChart = null;
    let pvByDay = {}, ctByDay = {};
    let pvByPath = {}, ctByPath = {};
    let dayLabels = [];
    const siteCharts = {};

    function buildDayMap() {
      const map = {};
      for (let i = 29; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        map[`${d.getMonth()+1}/${d.getDate()}`] = 0;
      }
      return map;
    }

    function makeChartConfig(labels, data) {
      return {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.08)',
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 4,
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { display: false },
              border: { display: false },
              ticks: { maxTicksLimit: 5, color: '#bbb', font: { size: 10 } }
            },
            y: {
              position: 'right',
              grid: { color: '#f0f0f0' },
              border: { display: false },
              ticks: { stepSize: 1, color: '#bbb', font: { size: 10 } },
              min: 0
            }
          }
        }
      };
    }

    function switchMetric(type, el) {
      document.querySelectorAll('.metric').forEach(m => m.classList.remove('active'));
      el.classList.add('active');
      const data = Object.values(type === 'ct' ? ctByDay : pvByDay);
      overallChart.data.datasets[0].data = data;
      overallChart.update();
    }

    function toggleChart(path, btn) {
      const wrap = btn.closest('.site-card').querySelector('.site-chart-wrap');
      const isOpen = wrap.classList.contains('open');

      if (isOpen) {
        wrap.classList.remove('open');
        btn.textContent = 'グラフ';
        return;
      }

      wrap.classList.add('open');
      btn.textContent = '閉じる';

      if (!siteCharts[path]) {
        const canvas = wrap.querySelector('canvas');
        const data = Object.values(pvByPath[path] || buildDayMap());
        siteCharts[path] = new Chart(canvas, makeChartConfig(dayLabels, data));
      }
    }

    function buildSiteList(stats) {
      const list = document.getElementById('site-list');
      list.innerHTML = '';

      const sorted = [...stats].sort((a, b) => b.pv - a.pv);

      for (const r of sorted) {
        const parts  = r.path.split('/');
        const user   = parts[0] ?? '';
        const folder = parts[1] ?? '';
        const ctr    = r.pv > 0 ? Math.round(r.ct / r.pv * 100) : 0;
        const ctrCls = ctr >= 30 ? 'ctr-high' : ctr >= 15 ? 'ctr-mid' : 'ctr-low';

        const card = document.createElement('div');
        card.className = 'site-card';
        card.innerHTML = `
          <div class="site-row">
            <div class="site-info">
              <div class="site-path">${user}<span>/</span>${folder}</div>
              <div class="site-nums">
                <div class="site-num">PV <b>${r.pv.toLocaleString()}</b></div>
                <div class="site-num">CT <b>${r.ct.toLocaleString()}</b></div>
                <div class="site-num ${ctrCls}">CTR <b>${ctr}%</b></div>
              </div>
            </div>
            <button class="graph-btn" onclick="toggleChart('${r.path}', this)">グラフ</button>
          </div>
          <div class="site-chart-wrap">
            <canvas></canvas>
          </div>`;
        list.appendChild(card);
      }
    }

    async function load() {
      const since = new Date();
      since.setDate(since.getDate() - 29);

      const [statsRes, eventsRes] = await Promise.all([
        fetch(`${SB}/rest/v1/stats?select=*`, {
          headers: { apikey: KEY, Authorization: `Bearer ${KEY}` }
        }),
        fetch(`${SB}/rest/v1/events?select=created_at,type,path&created_at=gte.${since.toISOString()}&order=created_at&limit=10000`, {
          headers: { apikey: KEY, Authorization: `Bearer ${KEY}` }
        })
      ]);

      const stats  = await statsRes.json();
      const events = await eventsRes.json();

      // サマリー
      const totalPv = stats.reduce((s, r) => s + r.pv, 0);
      const totalCt = stats.reduce((s, r) => s + r.ct, 0);
      const users   = new Set(stats.map(r => r.path.split('/')[0])).size;
      const ctr     = totalPv > 0 ? (totalCt / totalPv * 100).toFixed(2) : '0.00';

      document.getElementById('m-user').textContent = users;
      document.getElementById('m-pv').textContent   = totalPv.toLocaleString();
      document.getElementById('m-ct').textContent   = totalCt.toLocaleString();
      document.getElementById('m-ctr').textContent  = ctr + '%';

      // 全体 & サイト別 時系列
      pvByDay = buildDayMap();
      ctByDay = buildDayMap();

      for (const e of events) {
        const d   = new Date(e.created_at);
        const day = `${d.getMonth()+1}/${d.getDate()}`;

        if (e.type === 'pv') {
          if (day in pvByDay) pvByDay[day]++;
          if (!pvByPath[e.path]) pvByPath[e.path] = buildDayMap();
          if (day in pvByPath[e.path]) pvByPath[e.path][day]++;
        } else {
          if (day in ctByDay) ctByDay[day]++;
          if (!ctByPath[e.path]) ctByPath[e.path] = buildDayMap();
          if (day in ctByPath[e.path]) ctByPath[e.path][day]++;
        }
      }

      dayLabels = Object.keys(pvByDay);

      overallChart = new Chart(
        document.getElementById('chart-overall'),
        makeChartConfig(dayLabels, Object.values(pvByDay))
      );

      buildSiteList(stats);
    }

    load();
  </script>
</body>
</html>
